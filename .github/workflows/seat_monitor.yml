# .github/workflows/test_monitor.yml
#
# ICAI Seat Monitor — One-Time Manual Test
# ==========================================
# Runs test_seat_check.py (single scrape, no 5-min loop).
# Sends a Pushover notification regardless of seat count so you can
# confirm scraping + notification are both working before enabling
# the hourly production workflow.
#
# How to use:
#   Actions tab → "ICAI Seat Monitor — Test" → "Run workflow" button

name: ICAI Seat Monitor — Test

on:
  workflow_dispatch:   # Manual trigger only — no schedule

jobs:
  one-time-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # Single run should finish well under this

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests playwright-stealth

      - name: Install Chromium browser
        run: playwright install chromium --with-deps

      - name: Run one-time test
        env:
          PUSHOVER_USER:  ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
        run: |
          if [ -f "test_seat_check.py" ]; then
            python test_seat_check.py
          else
            echo "❌  test_seat_check.py not found in repository root!"
            ls -R
            exit 1
          fi

      # Always upload screenshots — critical for debugging when scrape returns 0
      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: |
            debug_screenshot.png
            error_screenshot.png
          retention-days: 1
          if-no-files-found: ignore
