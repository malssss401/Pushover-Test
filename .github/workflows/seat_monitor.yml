# .github/workflows/seat_monitor.yml

name: ICAI Seat Monitor — Test

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Fixes the Node.js 20 deprecation warning

jobs:
  one-time-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests playwright-stealth

      - name: Install Chromium
        run: playwright install chromium --with-deps

      - name: Run one-time test
        env:
          PUSHOVER_USER:  ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
        run: python test_seat_check.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            debug_screenshot.png
            error_screenshot.png
          retention-days: 1
          if-no-files-found: ignore
