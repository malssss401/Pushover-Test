name: Playwright Stealth One-Time Test

on:
  workflow_dispatch:
    # This allows you to click the "Run workflow" button manually in the Actions tab

jobs:
  test_run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Stealth Dependencies
        run: |
          python -m pip install --upgrade pip
          # We include playwright-stealth and its browser requirements
          pip install playwright requests playwright-stealth
          playwright install chromium --with-deps

      - name: Execute Stealth Script
        env:
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
        run: |
          if [ -f "seat_check.py" ]; then
            python seat_check.py
          else
            echo "❌ ERROR: seat_check.py not found in the root directory!"
            ls -R
            exit 1
          fi

      - name: Upload Screenshots (Check these if count is 0)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stealth-debug-logs
          path: |
            debug_screenshot.png
            error_screenshot.png
          retention-days: 1
